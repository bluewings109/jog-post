services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: jogpost
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jogpost}
      POSTGRES_DB: jogpost
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jogpost -d jogpost"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks: [jogpost]

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://jogpost:${POSTGRES_PASSWORD:-jogpost}@db:5432/jogpost
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks: [jogpost]

networks:
  jogpost:

volumes:
  postgres_data:
